name: MORTIS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Gate 1: Compile all targets
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target ${{ matrix.target }}

  # Gate 2 + 3: Unit + integration + E2E tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo test --test e2e

  # Gate 4: Linting
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  # Gate 5: Formatting
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # Gate 6: Dependency audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit
      - run: cargo audit

  # Gate 7: License check
  deny:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny
      - run: cargo deny check

  # Gate 9: MSRV check
  msrv:
    name: MSRV (1.75.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build

  # Gate 10: Dry-run no-side-effects (E2E harness)
  dry-run-safety:
    name: Dry-Run Safety
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test e2e dry_run_produces_no_side_effects

  # Gate 11: Receipt tamper detection
  receipt-tamper:
    name: Receipt Tamper Detection
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test e2e receipt_tamper_detection

  # Reproducible build verification
  reproducible:
    name: Reproducible Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build twice and compare hashes
        run: |
          SOURCE_DATE_EPOCH=0 cargo build --release 2>&1
          cp target/release/mortis /tmp/mortis-build-1
          cargo clean
          SOURCE_DATE_EPOCH=0 cargo build --release 2>&1
          cp target/release/mortis /tmp/mortis-build-2
          sha256sum /tmp/mortis-build-1 /tmp/mortis-build-2
          diff <(sha256sum /tmp/mortis-build-1 | cut -d' ' -f1) \
               <(sha256sum /tmp/mortis-build-2 | cut -d' ' -f1)

  # SBOM generation
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-cyclonedx
      - run: cargo cyclonedx -o mortis-sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: mortis-sbom.cdx.json
